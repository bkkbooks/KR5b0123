body:
  text: 上方大洞真元圖書繼說終篇子明告李昉曰而昕也聞諸逍遙云之曩時臣朝仙壇遇于白雲司馬鍊師言余届王屋清虛洞側獲真籙仙經二品一曰元精二曰丹華玩其真跡味其經㫖方知寵章鳯籙與世筆殊絶聖法仙方與凡文異軫空懷悵望深恨不覩其人然精習彌久撢頥淵微希其髣佛而已爰昔抱朴真人得元精丹華二經授沖和先生沖和先生授天台隱居劉君劉君元祖古瀛州濮海郡人也繼拜般陽李真人受金液之訣時龍集巳亥適株林於宇嫗處獲九鼎神丹即感上方錫號太素真人蓬萊仙君恆遊世間廣闡大洞妙真之元及採訪正言善誘民心度有德者務靚天猷且上聖之談經也者真仙以時而賦人然則真仙以經法天其天人之事當何如哉故髙士所貴乎履道而巳矣於是逍遙備參教訓其言也述先真之言即非誑誕其行也發後聖之行乃是的實是故言行咸法圖書肖乎雲札清新煥炳出辭天外垂訓凡間原其㫖慱矣哉故弘道而不匱非仙君其孰能云也是時逍遙告子明曰思惟仙君傳誨終焉人若或由之養生謐矣但患世人苟寡功行固弗克成其諒也哉仍歡心祕藏歸彭城之風宜乎讃詠而作偈言雍也共訉兮大洞真元兮仙君洪慈兮爰敷要道倪真源門下李從昭志而著之巳逸人曰僕聞聖人因言立教教是言詮若絶乎名言則師資安在故假常試之說以為行夤之門况人由道育道藉人弘肇有博施濟衆仍獲五福曠大未若傳經勸善即得百祥深重嗚呼世人弗悟大夢惟晝夜役役積藏餘賄但姤病死將至寇禍忽臨凌持酷虐求終罔有以𦤺物貨耗散於衆人惡業負纍於一身此之際也奚靡悼哉方當念道欲行善事象渴鑿井不亦晚乎爭如年且康健時值清平喜捨淨財印造寶經流通轉誦肖蒔祉田固知祝願昭報繇響應聲及乎隂德益著嘉禎遐降自然臣朝金闕遊宴玉京耶是時逸人于夷山之上曵杖而行歌曰博施濟衆之功兮未若傳經之福兮見存享于天祿兮己往升于仙堂兮臨行真勿空歸啼曩時先師間居或問三清上聖十方化身天尊子明對曰豫覽廣成先生疏天地之前混沌未立大道以一氣展轉相生為玄元始三氣第一始氣所化號天寶丈人治玉清境清微天總十有二部聖行之經為洞真教主明自然之道上成之樞第二元氣所化號靈寶丈人治上清境禹餘天總十有二部真行之經為洞玄教主演無為之道中成之機第三玄氣所化號神寶丈人治太清境大赤天總十有二部仙行之經為洞神教主開道德之本大成之柄也巳伏聞髙真無礙分身而千劫度人上聖垂光散影而十方接物昔元始應氣化身十方道言十方諸天尊其數如沙塵化形十方界普濟度天人是諸天尊以他心智了知一切根性可化度者化身往彼隨類救度接引羣生令入正道或作帝王身為衆生說帝王之道曰明無為之事輔自然之理恭敬以奉于上帝仁慈以愛于下民或作宰官身為衆生說宰官之道曰明廉忠正直恭敬惠義故誠事于上以恕蒞于下或作郎吏身為衆生說郎吏之道曰除酷虐害物之心以哀矜救生之行勿因好惡恣起賞罰由斯靡輟可以長久或作出家身為衆生說出家之道曰常無為而無不為事無可而無不可鋉內外之丹固性命之基逹妙有真無之理明洞神元氣之要既與道相合即長生久視或作法師身為衆生說法師之道曰明齊戒而設醮授彛籙以度人道述黃老經宗尹莊賁其臺觀宫殿禋于聖像真容及乎博施而蒔福田濟衆而由善果或作寵王身為衆生說龍王之道曰不泛溢以傷民田止飄浪而伏溝洫時錫甘膏滋飬稼穡或作男子身為衆生說男子之道曰田孝悌之德行仁慈之行契道符天安人利物及其居濁而納汚乘清而濯溜與時變化母執我固或作女人身為衆生就女人之道曰明安貞清烈之性及從正昭德之志孝敬事于長仁慈臨于紉或作乞士身為衆生說乞士之道曰篤喜無生豈樂自為甘貧而樂道不怨而忘貪知其命也寡其欲矣處清淡之地在優游之鄉或作下賤身為衆生說下賤之道曰宜乎恭事主者朝夕匪懈常酌水以獻花屢誦經而禮聖是諸化身天尊皆傳經度人故因緣經云若有善人抄寫經教三洞大乘福流永劫功德無邉何以故經者是上聖遺教導引愚迷能發衆生無量道意從悟成真衆聖修行皆證道果次問道經曰嘗看道非言則無以闡其奧言非道則無以立其本然無言而道隱不若有言而道明是故先師贊乎大哉道域驅邪德官貽祉萬神宗教五大劫年初乎龍漢延康之紀赤明上皇之號繼乎開皇紹運天文咸備恭惟上聖授度仙人以九誠十善三洞四輔統之以一丅二科列之以三十六部爰因大羅天尊演之以雲篆一百萬有八千篇上德皇帝著之以五千八百八十有一章道君傳六十一品開百二十門及其封三百六十洞天建七十二郡福地叙階職符籙選陟遷界治蓋其誨肇興乎一音經終叶于衆妙鳩醜巨範罔得而稱於是彊名大方之家凡一百一萬四千五百九十有二事具載玄都祕藏之內總明大洞妙經之元但患後人弗能閎覽尚匪去惑擬處無為直徂金闕𠕏其難乎未有不學而得者也但占一言勸善有益於修道人也偕隨音書之孤臣意者肅敬上祝大朝聖君睿算億萬斯年之永上方大洞真元圖書繼說終篇
